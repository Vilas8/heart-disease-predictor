services:
  - type: web
    name: heart-disease-predictor
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USE_SSL
        value: "false"
      # Set MAIL_USERNAME, MAIL_PASSWORD, MAIL_DEFAULT_SENDER in Render dashboard
